<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Cruise - Premium rides at your fingertips">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Cruise">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Cruise</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body { margin: 0; background: #000; overflow: hidden; }
    #loading {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #000; font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }
    #loading .logo {
      font-size: 48px; font-weight: 900; letter-spacing: 2px;
      color: #D4A843; margin-bottom: 32px;
    }
    #loading .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(212,168,67,0.15);
      border-top-color: #D4A843;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <!-- Loading screen shown while Flutter engine loads -->
  <div id="loading">
    <div class="logo">Cruise</div>
    <div class="spinner"></div>
  </div>

  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyALnqq4-_jJLUCLxSJaWZGZHgw27RVE78Y&libraries=places"></script>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    // Hide loading screen once Flutter renders first frame
    window.addEventListener('flutter-first-frame', function () {
      var el = document.getElementById('loading');
      if (el) el.style.display = 'none';
    });
  </script>
</body>
</html>
